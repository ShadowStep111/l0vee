<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio | @l0vee__</title>
    <style>
        /* Reset de estilos */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body, html {
            background-color: #050505;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- CURSOR PERSONALIZADO (Solo para ordenadores) --- */
        @media (pointer: fine) {
            body, html {
                cursor: none; /* Oculta el cursor nativo */
            }
            #custom-cursor {
                width: 8px;
                height: 8px;
                background: #ff0000;
                border-radius: 50%;
                position: fixed;
                pointer-events: none;
                z-index: 9999;
                transform: translate(-50%, -50%);
                display: block;
            }
            #custom-cursor-blur {
                width: 24px;
                height: 24px;
                border: 1px solid #ff0000;
                border-radius: 50%;
                position: fixed;
                pointer-events: none;
                z-index: 9998;
                transform: translate(-50%, -50%);
                transition: transform 0.08s ease-out;
                opacity: 0.5;
                display: block;
            }
        }

        /* Ocultar cursores en pantallas táctiles por defecto */
        #custom-cursor, #custom-cursor-blur {
            display: none;
        }

        /* --- PANTALLA DE ENTRADA --- */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease, visibility 1s;
            cursor: pointer;
        }

        #overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .enter-text {
            font-size: 1.1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
            color: #ff0000;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.6);
            text-align: center;
            padding: 0 20px;
        }

        /* --- FONDO DE VIDEO --- */
        #video-background {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            filter: brightness(25%) grayscale(70%);
            object-fit: cover;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .container {
            text-align: center;
            background: rgba(5, 5, 5, 0.55);
            padding: 40px 30px;
            border: 1px solid rgba(255, 0, 0, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 15px rgba(255, 0, 0, 0.05);
            max-width: 420px;
            width: 90%;
            margin: 40px auto;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease 0.5s;
        }

        body.loaded .container {
            opacity: 1;
            transform: translateY(0);
        }

        /* Avatar */
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid #ff0000;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
            object-fit: cover;
            display: inline-block;
        }

        h1 { 
            font-size: 1.6rem; 
            letter-spacing: 5px; 
            margin-bottom: 8px; 
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }

        .subtitle { 
            font-size: 0.8rem; 
            color: #ff0000; 
            margin-bottom: 20px; 
            letter-spacing: 2px;
        }

        /* --- SECCIONES PERSONALES --- */
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            margin: 20px 0;
        }

        .about-section {
            font-size: 0.8rem;
            color: #bbb;
            line-height: 1.6;
            margin-bottom: 15px;
            text-align: center; /* Centrado mejora la lectura en móviles */
        }

        .status-tags {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* --- ENLACES --- */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .links a {
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            padding: 14px; /* Un poco más grande para facilitar el toque con el dedo */
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        /* Efectos Hover (Solo activos en dispositivos con ratón) */
        @media (pointer: fine) {
            .links a:hover { 
                color: #ff0000; 
                border-color: #ff0000;
                background: rgba(255, 0, 0, 0.03);
                text-shadow: 0 0 10px rgba(255, 0, 0, 0.6);
                box-shadow: 0 0 15px rgba(255, 0, 0, 0.1);
                transform: scale(1.02);
            }
        }

        #audio-player { display: none; }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* Ajustes específicos para pantallas muy pequeñas */
        @media (max-width: 360px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <!-- Cursores personalizados -->
    <div id="custom-cursor"></div>
    <div id="custom-cursor-blur"></div>

    <!-- Pantalla de Entrada -->
    <div id="overlay" onclick="startProfile()">
        <div class="enter-text">Haz click para entrar</div>
    </div>

    <!-- Fondo de Video -->
    <video autoplay muted loop id="video-background" playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <!-- Perfil Principal -->
    <div class="container">
        <img src="https://via.placeholder.com/150" alt="Avatar" class="avatar">
        
        <h1>L0vee</h1>
        <p class="subtitle">"Sé lo que hago"</p>
        
        <!-- Etiquetas de información -->
        <div class="status-tags">
            <span class="tag">📍 España</span>
            <span class="tag">⏳ 18 años</span>
            <span class="tag">🎮 Jugador</span>
        </div>

        <!-- Biografía breve -->
        <div class="about-section">
            Editor y entusiasta de la tecnología explorando entornos digitales. Enfocado en el gaming, configuraciones personalizadas y desarrollo de código minimalista.
        </div>

        <div class="divider"></div>

        <!-- Redes Sociales / Enlaces -->
        <div class="links">
            <a href="https://discord.com/users/975051111427891230" target="_blank">Discord</a>
            <a href="https://www.instagram.com/gleb_boikoo/" target="_blank">Instagram</a>
            <a href="https://steamcommunity.com/profiles/76561199400300651/" target="_blank">Steam</a>
            <a href="https://twitch.tv/l0vee1/" target="_blank">Twitch</a>
        </div>
    </div>

    <!-- Música de fondo -->
    <audio id="audio-player" loop>
        <source src="https://files.catbox.moe/mlp0fn.mp3" type="audio/mpeg">
    </audio>

    <script>
        const cursor = document.getElementById('custom-cursor');
        const cursorBlur = document.getElementById('custom-cursor-blur');

        // Solo activa la lógica del ratón si el dispositivo cuenta con uno apuntando (no táctil puro)
        if (window.matchMedia("(pointer: fine)").matches) {
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
                
                cursorBlur.style.left = e.clientX + 'px';
                cursorBlur.style.top = e.clientY + 'px';
            });

            const links = document.querySelectorAll('a, #overlay');
            links.forEach(link => {
                link.addEventListener('mouseenter', () => {
                    cursorBlur.style.transform = 'translate(-50%, -50%) scale(1.5)';
                    cursorBlur.style.borderColor = '#ffffff';
                });
                link.addEventListener('mouseleave', () => {
                    cursorBlur.style.transform = 'translate(-50%, -50%) scale(1)';
                    cursorBlur.style.borderColor = '#ff0000';
                });
            });
        }

        // Función para quitar la pantalla de entrada, mostrar contenido y reproducir audio
        function startProfile() {
            document.getElementById('overlay').classList.add('hidden');
            document.body.classList.add('loaded');
            
            const audio = document.getElementById('audio-player');
            audio.volume = 0.4;
            audio.play().catch(error => {
                console.log("La reproducción automática fue bloqueada por el navegador:", error);
            });
        }
    </script>
</body>
</html>
