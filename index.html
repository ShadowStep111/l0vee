<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio | @l0vee__</title>
    <style>
        /* Reset de estilos */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- PANTALLA DE ENTRADA --- */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease, visibility 1s;
        }

        #overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .enter-text {
            font-size: 1.1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* Fondo de video */
        #video-background {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            filter: brightness(40%) grayscale(50%); /* Ajusta el look */
            object-fit: cover;
        }

        /* Contenedor Principal */
        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        h1 { font-size: 1.5rem; letter-spacing: 5px; margin-bottom: 10px; text-transform: uppercase; }
        p { font-size: 0.8rem; color: #888; margin-bottom: 20px; }

        /* Enlaces */
        .links a {
            color: #fff;
            text-decoration: none;
            margin: 0 10px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .links a:hover { color: #ff0000; text-shadow: 0 0 10px #ff0000; }

        /* Reproductor invisible/música */
        #audio-player { display: none; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startProfile()">
        <div class="enter-text">Click to enter</div>
    </div>

    <video autoplay muted loop id="video-background" playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <div class="container">
        <h1>L0vee</h1>
        <p>"Majesic RP ❤️"</p>
        
        <div class="links">
            <a href="https://discord.com/users/975051111427891230">Discord</a>
            <a href="https://www.instagram.com/gleb_boikoo/">Instagram</a>
            <a href="https://steamcommunity.com/profiles/76561199400300651/">Steam</a>
            <a href="https://twitch.tv/l0vee1/">Twitch</a>
        </div>
    </div>

    <audio id="audio-player" loop>
        <source src="https://files.catbox.moe/mlp0fn.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startProfile() {
            // Oculta la pantalla negra de entrada
            document.getElementById('overlay').classList.add('hidden');
            
            // Reproduce el audio incorporado
            const audio = document.getElementById('audio-player');
            audio.volume = 0.4;
            audio.play().catch(error => {
                console.log("El navegador bloqueó la reproducción automática:", error);
            });
        }
    </script>
</body>
</html>
